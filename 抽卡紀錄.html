function fmtDate(isoStr){
    if(!isoStr) return '';
    var parts2 = isoStr.split('T');
    var dParts = parts2[0].split('-');
    var result = dParts[0] + '/' + parseInt(dParts[1]) + '/' + parseInt(dParts[2]);
    if(parts2[1]){
        result += ' ' + (parts2[1].split(':').length < 3 ? parts2[1] + ':00' : parts2[1]);
    }
    return result;
}

function shortDate(isoStr){
    if(!isoStr) return '';
    var dParts = isoStr.split('-');
    return parseInt(dParts[1]) + '/' + parseInt(dParts[2]);
}

function buildBannerObj(){
    var name = document.getElementById('fName').value.trim();
    var tag = document.getElementById('fTag').value.trim();
    var dateFrom = document.getElementById('fDateFrom').value;
    var dateTo = document.getElementById('fDateTo').value;
    var type = document.getElementById('fType').value;
    var partner = document.getElementById('fPartner').value.trim();
    var cards = getCardsList().map(function(c){ return c.fullName; });
    var skip = (currentPullMode === 'skip');

    if(!name){ focusField('fName','請填寫卡池名稱'); return null; }
    if(!dateFrom){ focusField('fDateFrom','請填寫起始日期'); return null; }
    if(!dateTo){ focusField('fDateTo','請填寫結束日期'); return null; }
    if(!type){ focusField('fType','請選擇分類'); return null; }
    if(cards.length === 0){
        var cardEntries = document.querySelectorAll('#cardsList .card-entry');
        var hasIncomplete = false;
        cardEntries.forEach(function(entry){
            var icon = entry.querySelector('.cardChar').value;
            var cname = entry.querySelector('.cardName').value.trim();
            if(icon && !cname){ focusEl(entry.querySelector('.cardName'),'卡面名稱未填'); hasIncomplete = true; }
            else if(!icon && cname){ focusEl(entry.querySelector('.cardChar'),'卡面角色未選'); hasIncomplete = true; }
        });
        if(!hasIncomplete) showToast('請至少新增一張卡面', true);
        return null;
    }

    var fromFmt = fmtDate(dateFrom);
    var toShort = shortDate(dateTo);
    var fy = dateFrom.split('-')[0];
    var ty = dateTo.split('-')[0];
    var dateStr = fy === ty ? fromFmt + '-' + toShort : fromFmt + '-' + fmtDate(dateTo);

    if(skip){
        return { date:dateStr, name:name, tag:tag, type:type, cards:cards, pulls:[], gift:0, skip:true, giftFormula:'' };
    }

    var pullEntries = document.querySelectorAll('#pullsList .pull-entry');
    var pulls = [];
    var hasError = false;
    var prevPullAt = 0;
    pullEntries.forEach(function(entry){
        if(hasError) return;
        var pNameEl = entry.querySelector('.pName');
        var pName = pNameEl.value.trim();
        if(!pName || pName === '__custom__') return;
        var pIcon = entry.querySelector('.pIcon').value;
        if(!pIcon){ focusEl(entry.querySelector('.pIcon'),'出卡紀錄有未選擇角色的欄位'); hasError = true; return; }
        var pAt = parseInt(entry.querySelector('.pAt').value) || 0;
        var pDia = parseInt(entry.querySelector('.pDia').value) || 0;
        if(!pAt){ focusEl(entry.querySelector('.pAt'),'「'+pName+'」的累計抽數不能是 0'); hasError = true; return; }
        if(pAt < prevPullAt){ focusEl(entry.querySelector('.pAt'),'「'+pName+'」的累計抽數不能小於上一筆（'+prevPullAt+'）'); hasError = true; return; }
        prevPullAt = pAt;

        var pStd = entry.querySelector('.pStd').checked && entry.querySelector('.pStd').parentElement.style.display !== 'none';
        var pDbl = entry.querySelector('.pDbl').checked && entry.querySelector('.pDbl').parentElement.style.display !== 'none';
        var pBox = entry.querySelector('.pBox').checked && entry.querySelector('.pBox').parentElement.style.display !== 'none';
        var pExtra = entry.querySelector('.pExtra').checked && entry.querySelector('.pExtra').parentElement.style.display !== 'none';

        var p = {n:pName, icon:pIcon, at:pAt, dia:pDia};
        if(pStd || pName.startsWith('常駐')) p.std = true;
        if(pDbl) p.dbl = true;
        if(pBox) p.box = true;
        if(pExtra || pIcon==='📸' || pIcon==='👔' || pIcon==='🎲') p.extra = true;
        pulls.push(p);
    });
    if(hasError) return null;
    if(pulls.length === 0){ showToast('請至少填寫一筆出卡紀錄', true); return null; }

    var giftFormulaText = document.getElementById('giftFormula').textContent;
    var giftTotal = parseInt(document.getElementById('giftTotal').textContent.replace(/,/g,'')) || 0;

    var obj = { date:dateStr, name:name, tag:tag, type:type };
    if(partner) obj.partner = partner;
    obj.cards = cards;
    obj.pulls = pulls;
    obj.giftFormula = giftFormulaText === '-' ? '' : giftFormulaText;
    obj.gift = giftTotal;
    return obj;
}

function objToCode(obj){
    if(!obj) return '';
    var lines = ['  {'];
    lines.push("    date:'"+obj.date+"', name:'"+obj.name+"', tag:'"+obj.tag+"', type:'"+obj.type+"',");
    if(obj.skip){
        lines.push("    cards:["+obj.cards.map(function(c){return "'"+c+"'";}).join(',')+"], pulls:[], gift:0, skip:true, giftFormula:''");
        lines.push('  },');
        return lines.join('\n');
    }
    if(obj.partner) lines.push("    partner:'"+obj.partner+"',");
    lines.push("    cards:["+obj.cards.map(function(c){return "'"+c+"'";}).join(',')+"],");
    lines.push('    pulls:[');
    obj.pulls.forEach(function(p){
        var parts = ["n:'"+p.n+"'", "icon:'"+p.icon+"'", "at:"+p.at, "dia:"+p.dia];
        if(p.std) parts.push('std:true');
        if(p.dbl) parts.push('dbl:true');
        if(p.box) parts.push('box:true');
        if(p.extra) parts.push('extra:true');
        lines.push('      {' + parts.join(',') + '},');
    });
    lines.push('    ],');
    lines.push("    giftFormula:'"+(obj.giftFormula||'')+"', gift:"+(obj.gift||0));
    lines.push('  },');
    return lines.join('\n');
}

function generateCode(){
    var obj = buildBannerObj();

async function saveToData(){
    var obj = buildBannerObj();
    if(!obj) return;
    var code = objToCode(obj);
    try {
        var resp = await fetch('data.js?' + Date.now());
        var content = await resp.text();
        var lastBracket = content.lastIndexOf('];');
        if(lastBracket === -1){ showToast('data.js 格式異常，找不到 ];', true); return; }
        var newContent = content.substring(0, lastBracket) + code + '\n' + content.substring(lastBracket);
        var blob = new Blob([newContent], {type:'text/javascript;charset=utf-8'});
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'data.js';
        a.click();
        URL.revokeObjectURL(a.href);
        showToast('已下載更新後的 data.js，請替換原檔案');
    } catch(e){
        showToast('將以下載方式提供更新的 data.js');
        document.getElementById('codeOutput').textContent = code;
        document.getElementById('previewSection').style.display = 'block';
        document.getElementById('previewSection').scrollIntoView({behavior:'smooth'});
    }
}

function showMorePurchases(){
    purchaseListShown = Math.min(purchaseListShown + 5, purchases.length);

        var idx = parseInt(item.dataset.pidx);
        item.style.display = idx <= purchaseListShown ? '' : 'none';
    });
    updatePurchaseButtons();
}

function collapsePurchases(){
    purchaseListShown = 5;
    document.querySelectorAll('#purchaseList .data-item').forEach(function(item){
        var idx = parseInt(item.dataset.pidx);
        item.style.display = idx <= 5 ? '' : 'none';
    });
    updatePurchaseButtons();
}

function updatePurchaseButtons(){
    var wrap = document.getElementById('purchaseShowMoreWrap');
    if(!wrap) return;
    var left = purchases.length - purchaseListShown;
    var h = '';
    if(left > 0) h += '<button class="btn" style="border-color:var(--yellow);color:var(--yellow)" onclick="showMorePurchases()">顯示更多（還有 '+left+' 筆）</button>';

function highlightAmtPreset(entry){
    if(!entry) return;
    var input = entry.querySelector('.pe-amount');
    var wrap = entry.querySelector('.pe-amt-presets');
    if(!input || !wrap) return;
    var val = parseInt(input.value) || 0;
    wrap.querySelectorAll('.check-item').forEach(function(btn){
        var amt = parseInt(btn.textContent.replace('$',''));
        btn.classList.toggle('active', amt === val);

function pAmtChange(btn, delta){
    var row = btn.closest('.pull-qty-row');
    var input = row.querySelector('.pe-amount');
    var val = (parseInt(input.value) || 0) + delta;
    if(val < 0) val = 0;
    input.value = val;
    input.classList.toggle('has-value', val > 0);
    highlightAmtPreset(btn.closest('.purchase-entry'));
}

function sanitizePAmt(input){
    input.value = input.value.replace(/[^0-9]/g, '');
    var val = parseInt(input.value) || 0;
    if(val < 0) val = 0;
    input.value = val;
    input.classList.toggle('has-value', val > 0);
    highlightAmtPreset(input.closest('.purchase-entry'));
}

function buildPurchaseObjs(){
    var entries = document.querySelectorAll('#purchaseEntries .purchase-entry');
    var objs = [];
    var hasError = false;
    entries.forEach(function(entry, i){
        if(hasError) return;
        var dateEl = entry.querySelector('.pe-date');
        var noteEl = entry.querySelector('.pe-note');
        var catSel = entry.querySelector('.pe-category');
        var nameEl = entry.querySelector('.pe-name');
        var amountEl = entry.querySelector('.pe-amount');
        var date = dateEl ? dateEl.value : '';
        var note = noteEl ? noteEl.value.trim() : '';
        var category = catSel ? catSel.value : '';
        var name = nameEl ? nameEl.value.trim() : '';
        var amount = amountEl ? (parseInt(amountEl.value) || 0) : 0;
        if(!date){ focusEl(dateEl, '第 '+(i+1)+' 筆：請填寫日期'); hasError = true; return; }
        if(!category){ focusEl(catSel, '第 '+(i+1)+' 筆：請選擇分類'); hasError = true; return; }
        if(!name){ focusEl(nameEl, '第 '+(i+1)+' 筆：請填寫名稱'); hasError = true; return; }
        if(!amount){ focusEl(amountEl, '第 '+(i+1)+' 筆：請填寫金額'); hasError = true; return; }
        var dtParts = date.split('T');
        var dateParts = dtParts[0].split('-');
        var dateStr = dateParts[0] + '/' + parseInt(dateParts[1]) + '/' + parseInt(dateParts[2]);
        if(dtParts[1]){ dateStr += ' ' + (dtParts[1].split(':').length < 3 ? dtParts[1] + ':00' : dtParts[1]); }
        objs.push({ date:dateStr, category:category, name:name, amount:amount, note:note });
    });
    if(hasError) return null;
    if(objs.length === 0){ showToast('請至少新增一筆課金項目', true); return null; }
    return objs;
}

function purchaseObjToCode(obj){
    if(!obj) return '';
    var parts = ["date:'"+obj.date+"'", "category:'"+obj.category+"'", "name:'"+obj.name+"'", "amount:"+obj.amount];
    if(obj.note) parts.push("note:'"+obj.note+"'");
    return '  {' + parts.join(', ') + '},';
}

function generatePurchaseCode(){
    var objs = buildPurchaseObjs();
    if(!objs) return;
    var code = objs.map(function(o){ return purchaseObjToCode(o); }).join('\n');
    document.getElementById('purchaseCodeOutput').textContent = code;
    document.getElementById('purchasePreviewSection').style.display = 'block';
    document.getElementById('purchasePreviewSection').scrollIntoView({behavior:'smooth'});
    showToast('課金紀錄程式碼已產生（共 '+objs.length+' 筆）');
}

        showToast('已下載更新後的 data.js（共 '+objs.length+' 筆），請替換原檔案');
    } catch(e){
        showToast('將以下載方式提供更新的 data.js');
        document.getElementById('purchaseCodeOutput').textContent = code;
        document.getElementById('purchasePreviewSection').style.display = 'block';
        document.getElementById('purchasePreviewSection').scrollIntoView({behavior:'smooth'});
    }
}

function copyPurchaseCode(){
    var code = document.getElementById('purchaseCodeOutput').textContent;
    try {
        var ta = document.createElement('textarea');
        ta.value = code; ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
        document.body.appendChild(ta); ta.focus(); ta.select();
        document.execCommand('copy'); ta.remove();
        showToast('已複製到剪貼簿');
    } catch(e){ showToast('複製失敗，請手動選取複製', true); }
}

function clearPurchaseForm(){
    document.getElementById('purchaseEntries').innerHTML = '';
    peCount = 0;
    addPurchaseEntry();
    document.getElementById('purchasePreviewSection').style.display = 'none';
    showToast('課金表單已清空');
}

// 滑鼠拖曳橫向滾動（電腦版用）
function enableDragScroll(el){
    var isDown = false, startX, scrollLeft;
    el.addEventListener('mousedown', function(e){
        if(e.button !== 0) return;
        isDown = true; el.classList.add('dragging');
        startX = e.pageX - el.offsetLeft;
        scrollLeft = el.scrollLeft;
    });
    el.addEventListener('mouseleave', function(){ isDown = false; el.classList.remove('dragging'); });
    el.addEventListener('mouseup', function(){ isDown = false; el.classList.remove('dragging'); });
    el.addEventListener('mousemove', function(e){
        if(!isDown) return;
        e.preventDefault();
        el.scrollLeft = scrollLeft - (e.pageX - el.offsetLeft - startX);
    });
}
document.querySelectorAll('.filter-bar').forEach(enableDragScroll);
var chartBar = document.getElementById('chartRangeBar');
if(chartBar) enableDragScroll(chartBar);
</script>
